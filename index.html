<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Поделиться в сторис</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: -apple-system, sans-serif;
               display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .msg { text-align: center; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="msg">Открываю редактор сторис…</div>
    <button id="share" style="display:none; margin-top:24px; padding:14px 28px; border:0; border-radius:14px; background:#fff; color:#000; font-size:16px; font-weight:600;">Открыть редактор</button>
    <script>
        const msg = document.querySelector('.msg');
        const btn = document.getElementById('share');

        function getParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                img: params.get('img'),
                text: params.get('text') || '',
                linkUrl: params.get('link') || '',
                linkName: params.get('linkName') || 'Открыть бота',
            };
        }

        function buildOpts(p) {
            const opts = {};
            if (p.text) opts.text = p.text;
            if (p.linkUrl) opts.widget_link = { url: p.linkUrl, name: p.linkName };
            return opts;
        }

        let firedOnce = false;

        function fire() {
            const tg = window.Telegram && window.Telegram.WebApp;
            if (!tg) {
                msg.textContent = 'Telegram WebApp не доступен';
                return;
            }
            const p = getParams();
            if (!p.img) {
                msg.textContent = 'Нет картинки';
                return;
            }
            try {
                tg.shareToStory(p.img, buildOpts(p));
                firedOnce = true;
                msg.textContent = 'Готово';
                setTimeout(() => { try { tg.close(); } catch (e) {} }, 5000);
            } catch (e) {
                msg.textContent = 'Не удалось: ' + e.message;
                btn.style.display = 'inline-block';
            }
        }

        btn.addEventListener('click', fire);

        function init() {
            const tg = window.Telegram && window.Telegram.WebApp;
            if (!tg) {
                msg.textContent = 'Открой эту страницу из Telegram';
                btn.style.display = 'none';
                return;
            }
            try { tg.ready(); } catch (e) {}
            try { tg.expand(); } catch (e) {}

            // Кнопка-страховка показывается через 1с если автомат не сработал
            setTimeout(() => {
                if (!firedOnce) {
                    btn.style.display = 'inline-block';
                    msg.textContent = 'Нажми, чтобы открыть редактор';
                }
            }, 1000);

            // Автоматический вызов через короткий таймаут
            setTimeout(fire, 400);
        }

        if (document.readyState === 'complete') {
            init();
        } else {
            window.addEventListener('load', init);
        }
    </script>
</body>
</html>
