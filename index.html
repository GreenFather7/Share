<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Поделиться в сторис</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: -apple-system, sans-serif;
               display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .msg { text-align: center; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="msg">Открываю редактор сторис…</div>
    <script>
        (function () {
            const tg = window.Telegram && window.Telegram.WebApp;
            if (!tg) {
                document.querySelector('.msg').textContent = 'Открой эту страницу из Telegram';
                return;
            }
            tg.ready();

            const params = new URLSearchParams(window.location.search);
            const img = params.get('img');
            const text = params.get('text') || '';
            const linkUrl = params.get('link') || '';
            const linkName = params.get('linkName') || 'Открыть бота';

            if (!img) {
                document.querySelector('.msg').textContent = 'Нет картинки';
                return;
            }

            const opts = {};
            if (text) opts.text = text;
            if (linkUrl) opts.widget_link = { url: linkUrl, name: linkName };

            try {
                tg.shareToStory(img, opts);
            } catch (e) {
                document.querySelector('.msg').textContent = 'Не удалось открыть редактор: ' + e.message;
                return;
            }
            setTimeout(() => { try { tg.close(); } catch (e) {} }, 600);
        })();
    </script>
</body>
</html>
